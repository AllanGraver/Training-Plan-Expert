<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Løbeklar – din plan til løbsdagen</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HERO / HEADER -->
  <header class="hero">
    <h1>LØBEKLAR</h1>
    <p class="subtitle">
      Tilpas din træningsplan til din løbsdato og dit tempo – og kom klar til start.
    </p>
  </header>

  <!-- FELT 1 -->
  <section id="felt1" class="card-block">
    <h2>1. Vælg konkurrencedato og distance</h2>

    <label for="raceDate">Konkurrencedato</label>
    <input type="date" id="raceDate" />

    <div id="distanceButtons" class="distance-selector">
      <button class="distance-btn" data-distance="5">5 km</button>
      <button class="distance-btn" data-distance="10">10 km</button>
      <button class="distance-btn" data-distance="21.1">21,1 km</button>
      <button class="distance-btn" data-distance="42.2">42,2 km</button>
    </div>
  </section>

  <!-- FELT 2 -->
  <section id="felt2" class="card-block">
    <h2>2. Beregn træningspace</h2>

    <div class="vdot-row">
      <div class="vdot-field">
        <label for="vdotDistance">Distance</label>
        <select id="vdotDistance" class="vdot-select">
          <option value="" disabled selected>Vælg distance…</option>
          <option value="1.5">1500 m</option>
          <option value="1.609">1 mile</option>
          <option value="3">3 km</option>
