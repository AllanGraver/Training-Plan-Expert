<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">

  <!-- Mobilvenlig visning -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Løbeklar – din plan til løbsdagen</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  
<header class="hero">
    <h1>LØBEKLAR</h1>
    <p class="subtitle">- Tilpas din træningsplan til din løbsdato og dit tempo – og kom klar til start.</p>
  </header>


  <!-- ============================= -->
<!-- FELT 1: Dato + løbsdistance   -->
<!-- ============================= -->
<section id="felt1" class="card-block">
  <h2>1. Vælg konkurrencedato og distance</h2>

  <label for="raceDate">Konkurrencedato</label>
  <input type="date" id="raceDate">

  <div id="distanceButtons" class="distance-selector">
    <button class="distance-btn" data-distance="5">5 km</button>
    <button class="distance-btn" data-distance="10">10 km</button>
    <button class="distance-btn" data-distance="21.1">21,1 km</button>
    <button class="distance-btn" data-distance="42.2">42,2 km</button>
  </div>
</section>


<!-- ============================= -->
<!-- FELT 2: Beregn træningspace   -->
<!-- ============================= -->
<section id="felt2" class="card-block">
  <h2>2. Beregn træningspace</h2>

  <div class="vdot-row">
    <div class="vdot-field">
      <label>Distance</label>

      <div class="vdot-distance-scroll">
        <button class="vdot-dist-btn" data-dist="1.5">1500 m</button>
        <button class="vdot-dist-btn" data-dist="1.609">1 mile</button>
        <button class="vdot-dist-btn" data-dist="3">3 km</button>
        <button class="vdot-dist-btn" data-dist="3.218">2 miles</button>
        <button class="vdot-dist-btn" data-dist="5">5 km</button>
        <button class="vdot-dist-btn" data-dist="8">8 km</button>
        <button class="vdot-dist-btn" data-dist="8.046">5 miles</button>
        <button class="vdot-dist-btn" data-dist="10">10 km</button>
        <button class="vdot-dist-btn" data-dist="15">15 km</button>
        <button class="vdot-dist-btn" data-dist="16.093">10 miles</button>
        <button class="vdot-dist-btn" data-dist="20">20 km</button>
        <button class="vdot-dist-btn" data-dist="21.0975">½ marathon</button>
        <button class="vdot-dist-btn" data-dist="25">25 km</button>
        <button class="vdot-dist-btn" data-dist="30">30 km</button>
        <button class="vdot-dist-btn" data-dist="42.195">Marathon</button>
      </div>
    </div>

    <div class="vdot-field">
      <label>Løbstid</label>
      <div class="time-input-row">
        <input type="number" id="timeHours" min="0" placeholder="hh">
        <span class="time-sep">:</span>
        <input type="number" id="timeMinutes" min="0" max="59" placeholder="mm">
        <span class="time-sep">:</span>
        <input type="number" id="timeSeconds" min="0" max="59" placeholder="ss">
      </div>
    </div>
  </div>

  <button id="calculateVDOT">Beregn VDOT</button>

  <div id="vdotCard" class="vdot-card" style="display:none;">
    <h3>Din VDOT</h3>
    <div class="vdot-value" id="vdotValue"></div>

    <h4>Træningszoner</h4>
    <div class="vdot-zones">
      <div><strong>E:</strong> <span id="zoneE"></span></div>
      <div><strong>M:</strong> <span id="zoneM"></span></div>
      <div><strong>T:</strong> <span id="zoneT"></span></div>
      <div><strong>I:</strong> <span id="zoneI"></span></div>
      <div><strong>R:</strong> <span id="zoneR"></span></div>
    </div>
  </div>
</section>
  <!-- ============================= -->
  <!-- FELT 3: Vælg træningsplan     -->
  <!-- ============================= -->
  <section id="felt3">
    <h2>3. Vælg træningsplan</h2>

    <label for="planSelect">Tilgængelige træningsplaner</label><br>
    <select id="planSelect"></select>
  </section>

  <br>

  <!-- ============================= -->
  <!-- FELT 4: Generér træningsplan  -->
  <!-- ============================= -->
  <section id="felt4">
    <h2>4. Generér træningsplan</h2>
    <button id="generatePlan">Generér træningsplan</button>
    <button onclick="downloadCSV()">Download CSV</button>
    <button onclick="downloadICS()">Download iCal</button>
    <button onclick="window.print()">Print</button>
  </section>

  <hr>

  <h2>Træningsoversigt</h2>
  <div id="weekGrid"></div>

  <!-- JS -->
  <script src="vdot-zones.js"></script>
  <script src="app.js"></script>
  <script src="card-layout.js"></script>
  <script src="accordion-weeks.js"></script>

</body>
</html>
