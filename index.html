<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">

  <!-- Mobilvenlig visning -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Træningsplan Generator</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Træningsplan Generator</h1>

  <!-- ============================= -->
<!-- FELT 1: Dato + løbsdistance   -->
<!-- ============================= -->
<section id="felt1">
  <h2>1. Vælg konkurrencedato og distance</h2>

  <label for="raceDate">Konkurrencedato</label><br>
  <input type="date" id="raceDate"><br><br>

  <div id="distanceButtons" class="distance-selector">
    <button class="distance-btn" data-distance="5">5 km</button>
    <button class="distance-btn" data-distance="10">10 km</button>
    <button class="distance-btn" data-distance="21.1">21,1 km</button>
    <button class="distance-btn" data-distance="42.2">42,2 km</button>
  </div>
</section>

<br>

<!-- ============================= -->
<!-- FELT 2: Beregn træningspace   -->
<!-- ============================= -->
<section id="felt2">
  <h2>2. Beregn træningspace</h2>

  <div class="vdot-row">
    <div class="vdot-field">
      <label for="raceDistanceForVDOT">Distance</label>
      <select id="raceDistanceForVDOT">
        <option value="5">5 km</option>
        <option value="10">10 km</option>
        <option value="21.1">21,1 km</option>
        <option value="42.2">42,2 km</option>
      </select>
    </div>

    <div class="vdot-field">
      <label for="raceTime">Løbstid</label>
      <input type="text" id="raceTime" placeholder="mm:ss eller hh:mm:ss">
    </div>
  </div>

  <button id="calculateVDOT">Beregn VDOT</button>
  <div id="vdotResult"></div>
</section>

  <!-- ============================= -->
  <!-- FELT 3: Vælg træningsplan     -->
  <!-- ============================= -->
  <section id="felt3">
    <h2>3. Vælg træningsplan</h2>

    <label for="planSelect">Tilgængelige træningsplaner</label><br>
    <select id="planSelect"></select>
  </section>

  <br>

  <!-- ============================= -->
  <!-- FELT 4: Generér træningsplan  -->
  <!-- ============================= -->
  <section id="felt4">
    <h2>4. Generér træningsplan</h2>
    <button id="generatePlan">Generér træningsplan</button>
    <button onclick="downloadCSV()">Download CSV</button>
    <button onclick="downloadICS()">Download iCal</button>
    <button onclick="window.print()">Print</button>
  </section>

  <hr>

  <h2>Træningsoversigt</h2>
  <div id="weekGrid"></div>

  <!-- JS -->
  <script src="vdot-zones.js"></script>
  <script src="app.js"></script>
  <script src="card-layout.js"></script>
  <script src="accordion-weeks.js"></script>

</body>
</html>
